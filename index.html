<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="contenedor">
        <h2>Formulario MIAU</h2>

        <form id="miFormulario">
            <div class="grupo">
                <label for="nombre">Nombre completo</label>
                <input type="text" id="nombre" placeholder="Ingrese su nombre completo" required>
                <span id="errorNombre" class="error"></span>
            </div>

            <div class="grupo">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" placeholder="correo@ejemplo.com" required>
                <span id="errorCorreo" class="error"></span>
            </div>

            <div class="grupo">
                <label for="artista">Artista favorito</label>
                <input type="text" id="artista" placeholder="Ingrese su artista favorito" required>
                <span id="errorArtista" class="error"></span>
            </div>

            <div class="grupo">
                <label for="mensaje">Mensaje</label>
                <textarea id="mensaje" placeholder="Ingrese su mensaje" required></textarea>
                <span id="errorMensaje" class="error"></span>
            </div>

            <button type="submit">Enviar</button>
        </form>

        <hr class="separador">

        <div class="ultimo-dato">
            <h3>Último dato ingresado:</h3>
            <button type="button" id="btnUltimoDato">Mostrar datos</button>
            <div id="contenedorDatos" class="contenedor-datos"></div>
        </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
